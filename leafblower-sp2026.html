<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="author" content="Zachary Espiritu">
  <meta
    name="description"
    content="Links for Leafblower: A Leakage Attack Against TEE-Based Encrypted Databases, presented at IEEE Security &amp; Privacy 2026.">
  <meta property="og:title" content="Leafblower at IEEE S&amp;P 2026">
  <meta
    property="og:description"
    content="Paper, homepage, and MongoDB Research links for Zachary Espiritu's IEEE Security &amp; Privacy 2026 poster.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://zacharyespiritu.com/leafblower-sp2026.html">
  <link rel="icon" type="image/png" sizes="32x32" href="/images/icon/icon.ico/favicon-32x32.png">
  <link type="text/css" href="/css/main.css" rel="stylesheet">
  <title>Leafblower at IEEE S&amp;P 2026 | Zachary Espiritu</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #000000;
      --muted: #555f68;
      --paper: #f6f6f6;
      --panel: #ffffff;
      --line: #d7d7d7;
      --header: #18212d;
      --red: #b93838;
      --aqua: #4bbbc1;
      --aqua-dark: #2c7478;
      --shadow: 0 18px 54px rgba(24, 33, 45, 0.17);
      --mono: "SF Mono", "Lucida Console", "Monaco", monospace;
      --sans: "DM Sans", "Lato", "Verdana", "Helvetica Neue", "Helvetica", sans-serif;
      --caps: "concourse_6_caps", "DM Sans", "Lato", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--paper);
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      margin: 0;
      color: var(--ink);
      font-family: var(--mono);
      line-height: 1.45;
    }

    body::before {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      content: "";
      background-image:
        linear-gradient(rgba(24, 33, 45, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(24, 33, 45, 0.035) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.62), transparent 84%);
    }

    .top {
      padding: 34px 0 18px;
      background: var(--header);
      color: #ffffff;
    }

    .top-inner {
      width: min(100% - 2rem, 760px);
      margin: 0 auto;
      text-align: center;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 1rem;
      color: #ffffff;
      text-decoration: none;
    }

    .brand img {
      width: 146px;
      max-width: 42vw;
    }

    main {
      display: block;
      padding: clamp(1.25rem, 4vw, 3rem);
    }

    .card {
      width: min(100%, 560px);
      margin: 0 auto;
      padding: clamp(1.25rem, 5vw, 2rem);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .eyebrow {
      margin: 0 0 0.85rem;
      color: var(--red);
      font-family: var(--caps);
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-family: var(--sans);
      font-size: clamp(1rem, 3vw, 1.15rem);
      font-weight: 700;
      line-height: 1.16;
      letter-spacing: 0;
    }

    .links {
      display: grid;
      gap: 0.8rem;
      margin-top: clamp(0.9rem, 3vw, 1.25rem);
    }

    .link {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 0.9rem;
      align-items: center;
      min-height: 4.85rem;
      padding: 1rem;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: #ffffff;
      text-decoration: none;
      transition: transform 150ms ease, border-color 150ms ease, box-shadow 150ms ease;
    }

    .link:hover,
    .link:focus-visible {
      border-color: var(--aqua);
      box-shadow: 0 12px 24px rgba(24, 33, 45, 0.11);
      transform: translateY(-2px);
      outline: none;
    }

    .link:active {
      transform: translateY(0);
    }

    .link.paper {
      color: var(--red);
    }

    .link.home {
      color: var(--header);
    }

    .link.research {
      color: var(--aqua-dark);
    }

    .icon {
      display: grid;
      width: 2.8rem;
      height: 2.8rem;
      place-items: center;
      border-radius: 8px;
      color: #ffffff;
      font-size: 0.86rem;
      font-weight: 800;
      letter-spacing: 0;
    }

    .paper .icon {
      background: var(--red);
    }

    .home .icon {
      background: var(--header);
    }

    .research .icon {
      background: var(--aqua-dark);
    }

    .label {
      display: block;
      color: var(--ink);
      font-family: var(--sans);
      font-size: 1.04rem;
      font-weight: 780;
    }

    .url {
      display: block;
      margin-top: 0.16rem;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.78rem;
      overflow-wrap: anywhere;
    }

    .arrow {
      color: currentColor;
      font-size: 1.55rem;
      line-height: 1;
    }

    @media (max-width: 430px) {
      .top {
        padding-top: 28px;
        padding-bottom: 16px;
      }

      main {
        padding: 1rem;
      }

      .card {
        padding: 1.05rem;
      }

      .link {
        min-height: 4.55rem;
        padding: 0.9rem;
      }

      .url {
        font-size: 0.72rem;
      }

      h1 {
        font-size: 0.9rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .link {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <header class="top">
    <div class="top-inner">
      <a class="brand" href="https://zacharyespiritu.com" aria-label="Zachary Espiritu homepage">
        <img src="/images/logo.svg" alt="Zachary Espiritu">
      </a>
    </div>
  </header>

  <main>
    <section class="card" aria-labelledby="page-title">
      <p class="eyebrow">IEEE Security &amp; Privacy 2026 poster links</p>
      <h1 id="page-title">Leafblower: A Leakage Attack Against TEE-Based Encrypted Databases</h1>

      <nav class="links" aria-label="Leafblower links">
        <a class="link paper" href="https://zacharyespiritu.com/papers/leafblower-sp2026.pdf">
          <span class="icon" aria-hidden="true">PDF</span>
          <span>
            <span class="label">Read the paper</span>
            <span class="url">zacharyespiritu.com/papers/leafblower-sp2026.pdf</span>
          </span>
          <span class="arrow" aria-hidden="true">&gt;</span>
        </a>

        <a class="link home" href="https://zacharyespiritu.com">
          <span class="icon" aria-hidden="true">ZE</span>
          <span>
            <span class="label">Visit my homepage</span>
            <span class="url">zacharyespiritu.com</span>
          </span>
          <span class="arrow" aria-hidden="true">&gt;</span>
        </a>

        <a class="link research" href="https://www.mongodb.com/company/research">
          <span class="icon" aria-hidden="true">MBDR</span>
          <span>
            <span class="label">Visit MongoDB Research</span>
            <span class="url">mongodb.com/company/research</span>
          </span>
          <span class="arrow" aria-hidden="true">&gt;</span>
        </a>
      </nav>

    </section>
  </main>
</body>
</html>
